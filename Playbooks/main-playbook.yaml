---
- name: Dummy playbook
  hosts: all
  gather_facts: true
  tasks:
    - name: Show the user that was used to SSH
      ansible.builtin.debug:
        var: ansible_user
  post_tasks:
    - name: show servers that failed
      ansible.builtin.debug:
        var: ansible_play_hosts_all | difference(ansible_play_hosts)
