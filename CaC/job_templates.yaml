controller_templates:
  - name: JT-MAIN-LOGIC
    job_type: run
    organization: Default
    inventory: INV-ALL-HOSTS
    project: PJ-AAP-CODE
    playbook: Playbooks/main-playbook.yaml
    ask_limit_on_launch: true
    ask_credential_on_launch: true

  - name: JT-LAUNCHER
    job_type: run
    organization: Default
    inventory: INV-LOCAL
    project: PJ-AAP-CODE
    playbook: Playbooks/jt-launcher-playbook.yaml
    credentials:
      - CRED-AAP-ADMIN